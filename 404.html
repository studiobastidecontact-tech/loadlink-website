<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page introuvable · LoadLink</title>
  <meta name="description" content="Cette page n'existe pas. Retour à l'accueil de LoadLink.">
  <meta name="theme-color" content="#0A0A0B">

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Redirection automatique après 5 secondes -->
  <meta http-equiv="refresh" content="5; url=/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles.css">

  <style>
    .error-main {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-4);
      text-align: center;
    }
    .error-box {
      max-width: 520px;
      width: 100%;
    }
    .error-code {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(180deg, #F5F5F7 0%, #8E8E93 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 var(--space-4);
    }
    .error-title {
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 600;
      color: #F5F5F7;
      margin: 0 0 var(--space-3);
      letter-spacing: -0.02em;
    }
    .error-desc {
      font-size: 17px;
      color: #8E8E93;
      margin: 0 0 var(--space-7);
      line-height: 1.5;
    }
    .error-actions {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-redirect-info {
      margin-top: var(--space-7);
      font-size: 13px;
      color: #6E6E73;
      font-family: 'Geist Mono', ui-monospace, monospace;
    }
    .error-redirect-info span#countdown {
      color: #0A84FF;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>LoadLink</span>
      </a>
      <nav class="nav">
        <a href="/#features">Fonctions</a>
        <a href="/#sites">Sites supportés</a>
        <a href="/#download" class="nav-cta">Télécharger</a>
      </nav>
    </div>
  </header>

  <!-- ERROR CONTENT -->
  <main class="error-main">
    <div class="error-box">
      <div class="error-code">404</div>
      <h1 class="error-title">Cette page s'est échappée.</h1>
      <p class="error-desc">
        L'URL que tu as suivie n'existe pas ou n'existe plus.<br>
        Pas de panique, on te ramène à la maison.
      </p>
      <div class="error-actions">
        <a href="/" class="btn-primary">Retour à l'accueil</a>
        <a href="/#download" class="btn-secondary">Télécharger LoadLink</a>
      </div>
      <p class="error-redirect-info">
        Redirection automatique dans <span id="countdown">5</span>s…
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 LoadLink</span>
        <span class="dot">·</span>
        <a href="/legal.html">Mentions légales</a>
      </div>
    </div>
  </footer>

  <script>
    // Live countdown
    let secs = 5;
    const el = document.getElementById('countdown');
    const interval = setInterval(() => {
      secs--;
      if (el) el.textContent = secs;
      if (secs <= 0) clearInterval(interval);
    }, 1000);
  </script>
</body>
</html>
